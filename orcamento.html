<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelagem Pro | David Carvalho</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container main-page">
    <nav class="top-bar no-print">
        <div class="status-save" id="save-status">Sincronizado localmente</div>
        <button class="btn-outline" onclick="limparRascunho()">Limpar Orçamento</button>
    </nav>

    <header class="header-main">
        <div class="header-left">
            <h1 class="doc-title">ORÇAMENTO</h1>
            <p class="doc-subtitle">PROPOSTA DE SERVIÇOS TÉCNICOS</p>
        </div>
        <div class="header-right">
            <div class="brand-logo">
                <div class="brand-text">
                    <h2>David Carvalho</h2>
                    <p>Modelagem Computadorizada</p>
                </div>
                <div class="logo-icon">DC</div>
            </div>
        </div>
    </header>

    <section class="meta-strip">
        <div class="meta-item">
            <span class="meta-label">DATA DE EMISSÃO</span>
            <input type="text" id="data-emissao" class="meta-value input-plain-dark">
        </div>
        <div class="meta-item client-block">
            <span class="meta-label">CLIENTE / EMPRESA</span>
            <input type="text" id="cliente-nome" placeholder="NOME DO CLIENTE" class="meta-value client-input" oninput="salvarTudo()">
        </div>
    </section>

    <div id="lista-modelos">
        </div>

    <div class="actions-add no-print">
        <button class="btn-add" onclick="adicionarNovoModelo()">+ ADICIONAR NOVO MODELO</button>
    </div>

    <footer class="footer-summary">
        <div class="summary-left">
            <p class="thank-you">Obrigado pela preferência!</p>
            <div class="contact-info-list">
                <p><strong>WhatsApp:</strong> (85) 99917-1800</p>
                <p><strong>E-mail:</strong> davidcarvalhomodelista@gmail.com</p>
                <div class="site-button-wrapper">
                    <a href="https://davidcarvalhomodelista.vercel.app/" target="_blank" class="btn-site-styled">ACESSE NOSSO SITE</a>
                </div>
            </div>
            <div id="qrcode" class="qr-code-style"></div>
        </div>
        <div class="summary-right">
            <div class="total-box-final">
                <span class="total-label-final">VALOR TOTAL DA PROPOSTA</span>
                <span class="total-value-final">R$ <span id="valor-total">0,00</span></span>
            </div>
        </div>
    </footer>
    
    <button class="btn-print no-print" onclick="window.print()">GERAR PDF / IMPRIMIR ORÇAMENTO</button>
</div>

<script src="script.js"></script>
</body>
</html>
